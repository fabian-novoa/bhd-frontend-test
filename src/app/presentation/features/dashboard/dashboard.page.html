<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Dashboard BHD</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="dashboard-placeholder">
    <h2>¡Bienvenido a BHD!</h2>
    <p>Has iniciado sesión correctamente.</p>

      Próximamente verás tus productos y movimientos aquí.

      Cerrar Sesión

  </div>
</ion-content>
